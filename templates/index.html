<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Item Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #203331c8 0%, #421f1f 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #7c7f8b 0%, #4f6363 100%);
      color: white;
      padding: 32px;
      text-align: center;
    }
    h1 { 
      font-size: 32px;
      font-weight: 600;
      margin: 0 0 8px 0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .subtitle {
      font-size: 16px;
      opacity: 0.9;
      font-weight: 400;
    }
    .content { padding: 32px; }
    form { 
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    input { 
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #e8443f;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button { 
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-add  { 
      background: linear-gradient(135deg, #948914 0%, #dcb07a 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(120, 35, 14, 0.751);
    }
    .btn-add:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(204, 210, 236, 0.715);
    }
    .btn-del  { 
      background: #ef4444;
      color: #fff;
      padding: 8px 16px;
      font-size: 13px;
    }
    .btn-del:hover { 
      background: #dc2626;
      transform: scale(1.05);
    }
    .btn-save { 
      background: #10b981;
      color: #fff;
      padding: 8px 16px;
      font-size: 13px;
    }
    .btn-save:hover { 
      background: #059669;
      transform: scale(1.05);
    }
    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    table { 
      width: 100%;
      border-collapse: collapse;
    }
    th, td { 
      text-align: left;
      padding: 16px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 14px;
    }
    th { 
      background: #f9fafb;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    tr:hover { background: #f9fafb; }
    tr:last-child td { border-bottom: none; }
    td input { 
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      transition: border 0.3s;
    }
    td input:focus {
      outline: none;
      border-color: #66eaa6;
    }
    .actions { 
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
    }
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 Item Manager</h1>
      <p class="subtitle">A simple CRUD app to manage your inventory items</p>
    </div>
    
    <div class="content">
      <form id="add-form">
        <input id="name" placeholder="Item name" required />
        <input id="desc" placeholder="Description (optional)" />
        <button type="submit" class="btn-add">Add Item</button>
      </form>

      <div class="table-wrapper">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Description</th><th style="text-align: right;">Actions</th></tr></thead>
          <tbody id="items"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const tbody = document.getElementById("items");

    async function load() {
      const rows = await fetch("/items").then(r => r.json());
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty-state">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
          <div>No items yet. Add your first item above!</div>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(item => `
        <tr id="row-${item.id}">
          <td><strong>#${item.id}</strong></td>
          <td><input value="${item.name}" id="name-${item.id}" /></td>
          <td><input value="${item.description ?? ""}" id="desc-${item.id}" /></td>
          <td class="actions">
            <button class="btn-save" onclick="save(${item.id})">Save</button>
            <button class="btn-del"  onclick="del(${item.id})">Delete</button>
          </td>
        </tr>`).join("");
    }

    document.getElementById("add-form").addEventListener("submit", async e => {
      e.preventDefault();
      const nameInput = document.getElementById("name");
      const descInput = document.getElementById("desc");
      await fetch("/items", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: nameInput.value, description: descInput.value })
      });
      e.target.reset();
      load();
    });

    async function save(id) {
      await fetch(`/items/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: document.getElementById(`name-${id}`).value,
          description: document.getElementById(`desc-${id}`).value
        })
      });
      load();
    }

    async function del(id) {
      await fetch(`/items/${id}`, { method: "DELETE" });
      load();
    }

    load();
  </script>
</body>
</html>
